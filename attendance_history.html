<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Attendance History</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f3e8;
      color: #2f2f2f;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .sub {
      color: #777;
      font-size: 14px;
      line-height: 1.6;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .summary-box {
      background: #eef6e8;
      border-radius: 16px;
      padding: 12px;
      text-align: center;
    }

    .summary-box.orange { background: #fff0d6; }
    .summary-box.red { background: #ffe2e2; }

    .num {
      font-size: 24px;
      font-weight: 800;
    }

    .label {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border: 1px solid #ddd;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
    }

    .day-head {
      background: #eef6e8;
      padding: 8px 2px;
      text-align: center;
      font-size: 11px;
      font-weight: 800;
      border-right: 1px solid #ddd;
    }

    .day-cell {
      height: 86px;
      min-width: 0;
      padding: 6px 3px;
      border-top: 1px solid #ddd;
      border-right: 1px solid #ddd;
      font-size: 10px;
      background: #fff;
      overflow: hidden;
      position: relative;
    }

    .day-cell.present {
      background: #f4fbf0;
    }

    .day-cell.late {
      background: #fff0d6;
      color: #9a5a00;
    }

    .day-cell.empty-cell {
      background: #fafafa;
    }

    .day-cell.today {
      border: 2px solid #2f6b2f;
      box-shadow: inset 0 0 0 1px #2f6b2f;
    }

    .today-tag {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      background: #2f6b2f;
      border-radius: 50%;
    }

    .day-num {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .time-line {
      font-size: 10px;
      line-height: 1.3;
      word-break: keep-all;
    }

    .late-text {
      color: #b05a00;
      font-weight: 800;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 4px;
    }

    .dot.present { background: #dff2d7; }
    .dot.late { background: #fff0d6; }
    .dot.none { background: #fafafa; border: 1px solid #ddd; }

    .loading,
    .error,
    .empty {
      text-align: center;
      padding: 34px 10px;
      color: #777;
    }

    .error {
      color: #a33;
      background: #fff0f0;
      border-radius: 16px;
    }

    .day-cell.off {
      background: #ffe2e2;
    }

    .day-cell.hot {
      background: #e4f6df;
    }

    .day-cell.off .day-num {
      color: #b22222;
    }

    .day-cell.hot .day-num {
      color: #2f8f2f;
    }

    .day-cell.missing {
      background: #fff7cc;
    }
    
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="title">ประวัติการเข้างาน</div>
      <div class="sub" id="employeeInfo">กำลังโหลดข้อมูล...</div>
    </div>

    <div id="app">
      <div class="card loading">กำลังโหลด...</div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2010317944-JFsW8yLs';

    const GAS_API_URL =
      'https://script.google.com/macros/s/AKfycbzzm6lTF7aMi0ufzas0KV9l6g_ab-_UqCEHFvxe23l3R4DgLMDUDig60HssQg5WqGCN0A/exec';

    let lineUid = '';

    async function callApi(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      return await res.json();
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        lineUid = profile.userId;

        const res = await callApi({
          action: 'getMyAttendanceHistory',
          line_uid: lineUid
        });

        if (!res.success) {
          showError(res.message || 'โหลดข้อมูลไม่สำเร็จ');
          return;
        }

        renderHistory(res);

      } catch (err) {
        showError(err.message || err);
      }
    }

    function renderHistory(res) {
      const emp = res.employee || {};
      const rows = res.rows || [];
      const summary = res.summary || {};

      document.getElementById('employeeInfo').innerHTML =
        `${emp.nickname || ''} · ${emp.employee_code || ''}<br>` +
        `รอบ ${formatFullThaiDate(res.range_start)} - ${formatFullThaiDate(res.range_end)}`;

      const app = document.getElementById('app');

      const dailyMap = buildDailyMap(rows);

      app.innerHTML = `
        <div class="card">
          <div class="summary-grid">
            <div class="summary-box orange">
              <div class="num">${summary.late_count || 0}</div>
              <div class="label">มาสาย<br>${summary.late_minutes || 0} นาที</div>
            </div>

            <div class="summary-box">
              <div class="num">${summary.ot_hours || '0.00'}</div>
              <div class="label">OT สะสม<br>ชั่วโมง</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="legend">
            <span><i class="dot present"></i> มีบันทึกเวลา</span>
            <span><i class="dot late"></i> มาสาย</span>
            <span><i class="dot none"></i> ไม่มีบันทึก</span>
          </div>

          ${buildCalendarHtml(res.range_start, res.range_end, dailyMap, summary.by_date || {})}
        </div>
      `;
    }

    function buildDailyMap(rows) {
      const map = {};

      rows.forEach(function(r) {
        const dateText = r.date;

        if (!map[dateText]) {
          map[dateText] = {
            date: dateText,
            check_in: '',
            check_out: ''
          };
        }

        if (r.check_type === 'CHECK_IN') {
          if (!map[dateText].check_in || new Date(r.datetime) < new Date(map[dateText].check_in)) {
            map[dateText].check_in = r.datetime;
          }
        }

        if (r.check_type === 'CHECK_OUT') {
          if (!map[dateText].check_out || new Date(r.datetime) > new Date(map[dateText].check_out)) {
            map[dateText].check_out = r.datetime;
          }
        }
      });

      return map;
    }

    function buildCalendarHtml(startText, endText, dailyMap, summaryMap) {
      const weekHeads = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];

      const start = new Date(startText);
      const end = new Date(endText);

      const first = new Date(start);
      const day = first.getDay();
      const mondayOffset = day === 0 ? -6 : 1 - day;
      first.setDate(first.getDate() + mondayOffset);

      const missingCheckout =
      dayData &&
      dayData.check_in &&
      !dayData.check_out;

      if (missingCheckout) {
      cls += ' missing';
      }
      
      let html = '<div class="calendar">';

      weekHeads.forEach(function(w) {
        html += '<div class="day-head">' + w + '</div>';
      });

      const current = new Date(first);
      const todayText = toDateText(new Date());

      while (current <= end || current.getDay() !== 1) {
        const dateText = toDateText(current);
        const inRange = current >= start && current <= end;
        const dayData = dailyMap[dateText];
        const daySummary = summaryMap[dateText] || {};
        const attendanceStatus = daySummary.attendance_status || '';
        const lateMinutes = Number(daySummary.late_minutes || 0);

        let cls = 'day-cell';
        let content = '';

        if (!inRange) {
          cls += ' empty-cell';
        } else {
          const isToday = dateText === todayText;

        if (attendanceStatus === 'OFF') {
          cls += ' off';

          content = '<div class="day-num">' +
          current.getDate() + '</div>';
        }
        else if (attendanceStatus === 'HOT') {
          cls += ' hot';
          
          content = '<div class="day-num">' +
          current.getDate() + '</div>' + '<div class="time-line"><b>HOT</b></div>';
        }
          
          if (dayData && dayData.check_in) {
            cls += lateMinutes > 0 ? ' late' : ' present';

            content =
            '<div class="day-num">' + current.getDate() + '</div>' +
            '<div class="time-line">เข้า ' + formatTime(dayData.check_in) + '</div>' +
            '<div class="time-line">ออก ' + formatTime(dayData.check_out) + '</div>' +
            (lateMinutes > 0
            ? '<div class="time-line late-text">สาย ' + lateMinutes + ' นาที</div>'
            : '');
        } else {
            content =
              '<div class="day-num">' + current.getDate() + '</div>';
          }

          if (isToday) {
            cls += ' today';
            content += '<div class="today-tag"></div>';
          }
        }

        html += '<div class="' + cls + '">' + content + '</div>';

        current.setDate(current.getDate() + 1);
        if (current > end && current.getDay() === 1) break;
      }

      html += '</div>';
      return html;
    }

    function formatTime(value) {
      if (!value) return '-';

      const d = new Date(value);
      if (isNaN(d.getTime())) return value;

      return d.toLocaleTimeString('th-TH', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatFullThaiDate(value) {
      if (!value) return '-';

      const d = new Date(value);
      if (isNaN(d.getTime())) return value;

      const weekdays = [
        'วันอาทิตย์',
        'วันจันทร์',
        'วันอังคาร',
        'วันพุธ',
        'วันพฤหัสบดี',
        'วันศุกร์',
        'วันเสาร์'
      ];

      const months = [
        'ม.ค.',
        'ก.พ.',
        'มี.ค.',
        'เม.ย.',
        'พ.ค.',
        'มิ.ย.',
        'ก.ค.',
        'ส.ค.',
        'ก.ย.',
        'ต.ค.',
        'พ.ย.',
        'ธ.ค.'
      ];

      return weekdays[d.getDay()] +
        'ที่ ' +
        d.getDate() +
        ' ' +
        months[d.getMonth()] +
        ' ' +
        String(d.getFullYear() + 543).slice(-2);
    }

    function toDateText(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');

      return y + '-' + m + '-' + day;
    }

    function showError(message) {
      document.getElementById('app').innerHTML =
        '<div class="card error">' + message + '</div>';
    }

    main();
  </script>
</body>
</html>
