<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>HR Admin Center</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f3e8;
      color: #2f2f2f;
    }

    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 20px;
    }

    .head {
      background: #fff;
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: #777;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 900;
      margin: 14px 4px 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      border: none;
      background: #fff;
      border-radius: 20px;
      padding: 18px 12px;
      min-height: 88px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
      font-size: 15px;
      font-weight: 800;
      color: #2f2f2f;
      text-align: center;
    }

    .btn small {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #777;
      line-height: 1.35;
    }

    .loading,
    .error {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      color: #777;
    }

    .error {
      color: #a33;
      background: #fff0f0;
    }

    .label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      margin: 12px 4px 6px;
    }

    .input {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px;
      font-size: 15px;
      background: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .btn-save {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px;
      font-size: 16px;
      font-weight: 900;
      background: #7fb069;
      color: white;
      margin-top: 18px;
    }

    .btn-back {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px;
      font-size: 16px;
      font-weight: 900;
      background: #ddd;
      color: #333;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="app">
      <div class="loading">กำลังโหลด...</div>
    </div>
  </div>

  <script>
  let lineUid = '';

  const LIFF_ID = '2010317944-82Rv6kVa';

  const GAS_API_URL =
    'https://script.google.com/macros/s/AKfycbzzm6lTF7aMi0ufzas0KV9l6g_ab-_UqCEHFvxe23l3R4DgLMDUDig60HssQg5WqGCN0A/exec';

  const URLS = {
    hrDashboard: 'https://liff.line.me/2010317944-JT6WkNZ4',
    dashboard: 'https://liff.line.me/2010317944-qrJlENj0',
    employeeApprove: 'https://liff.line.me/2010317944-CjJMkJ3I',
    employeeList: 'https://liff.line.me/2010317944-Nwoclupm',
    employeeDetail: 'https://liff.line.me/2010317944-Iu21jArf',
    scheduleAdmin: 'https://liff.line.me/2010317944-Gkh7the0',
    leaveApprove: 'https://liff.line.me/2010317944-6koLiYjX'
  };

  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      lineUid = profile.userId;

      renderAdmin();

    } catch (err) {
      showError(err.message || err);
    }
  }

  async function callApi(payload) {
    const res = await fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });

    return await res.json();
  }

  function renderAdmin() {
    document.getElementById('app').innerHTML = `
      <div class="head">
        <div class="title">HR Admin Center</div>
        <div class="sub">ศูนย์รวมเมนูสำหรับผู้จัดการ / HR / เจ้าของ</div>
      </div>

      <div class="section">
        <div class="section-title">📊 ภาพรวม</div>
        <div class="grid">
          <button class="btn" onclick="openPage('hrDashboard')">
            HR Dashboard
            <small>ภาพรวม HR รายวัน</small>
          </button>

          <button class="btn" onclick="openPage('dashboard')">
            Dashboard
            <small>ภาพรวมระบบ</small>
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">👥 พนักงาน</div>
        <div class="grid">
          <button class="btn" onclick="openPage('employeeList')">
            รายชื่อพนักงาน
            <small>ดูข้อมูลพนักงานทั้งหมด</small>
          </button>

          <button class="btn" onclick="openPage('employeeApprove')">
            อนุมัติพนักงาน
            <small>อนุมัติคนสมัครใหม่</small>
          </button>

          <button class="btn" onclick="openPage('employeeDetail')">
            รายละเอียดพนักงาน
            <small>ค้นหาและดูข้อมูลรายคน</small>
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">📅 ตารางงาน / การลา</div>
        <div class="grid">
          <button class="btn" onclick="openPage('scheduleAdmin')">
            จัดตารางงาน
            <small>เพิ่ม / แก้ไขตารางงาน</small>
          </button>

          <button class="btn" onclick="openPage('leaveApprove')">
            อนุมัติใบลา
            <small>ตรวจสอบคำขอลา</small>
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">💰 ค่าใช้จ่ายพนักงาน</div>
        <div class="grid">
          <button class="btn" onclick="renderEmployeeChargeForm()">
            เพิ่มค่าใช้จ่าย
            <small>ยูนิฟอร์ม / ตรวจสุขภาพ / เงินหัก</small>
          </button>

          <button class="btn" onclick="renderEmployeeChargeList()">
            จัดการรายการ
            <small>ดู / ปิดรายการค่าใช้จ่าย</small>
          </button>
        </div>
      </div>
    `;
  }

  function openPage(key) {
    window.location.href = URLS[key];
  }

  async function renderEmployeeChargeForm() {
  const res = await callApi({
    action: 'getChargeAdminData',
    line_uid: lineUid
  });

  if (!res.success) {
    alert(res.message || 'โหลดรายชื่อพนักงานไม่สำเร็จ');
    return;
  }

  const employees = res.employees || [];

  const employeeOptions = employees.map(function(e) {
    const name = `${e.employee_code} - ${e.nickname || e.first_name || ''} ${e.last_name || ''}`;
    return `<option value="${e.employee_code}">${name}</option>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="head">
      <div class="title">ค่าใช้จ่ายพนักงาน</div>
      <div class="sub">เพิ่มรายการที่มีผลผูกพัน เช่น ยูนิฟอร์ม / ตรวจสุขภาพ</div>
    </div>

    <div class="section">
      <label class="label">เลือกพนักงาน</label>
      <select id="chargeEmployeeCode" class="input">
        <option value="">เลือกพนักงาน</option>
        ${employeeOptions}
      </select>

      <label class="label">ประเภทค่าใช้จ่าย</label>
      <select id="chargeType" class="input">
        <option value="UNIFORM">ยูนิฟอร์ม</option>
        <option value="HEALTH_CHECK">ตรวจสุขภาพ</option>
        <option value="OTHER">อื่นๆ</option>
      </select>

      <label class="label">ชื่อรายการ</label>
      <input id="chargeName" class="input" placeholder="เช่น ยูนิฟอร์ม 1 ชุด">

      <label class="label">จำนวนเงิน</label>
      <input id="chargeAmount" class="input" type="number" placeholder="เช่น 500">

      <label class="label">วันที่เกิดรายการ</label>
      <input id="chargeEventDate" class="input" type="date">

      <label class="label">มีผลผูกพันกี่ปี</label>
      <input id="chargeYears" class="input" type="number" value="1">

      <label class="label">หมายเหตุ</label>
      <textarea id="chargeNote" class="input" rows="3"></textarea>

      <button class="btn-save" onclick="submitEmployeeCharge()">บันทึกค่าใช้จ่าย</button>
      <button class="btn-back" onclick="renderAdmin()">กลับ</button>
    </div>
  `;
}

  async function submitEmployeeCharge() {
    const data = {
      line_uid: lineUid,
      employee_code: document.getElementById('chargeEmployeeCode').value.trim(),
      charge_type: document.getElementById('chargeType').value,
      charge_name: document.getElementById('chargeName').value.trim(),
      amount: document.getElementById('chargeAmount').value,
      charge_event_date: document.getElementById('chargeEventDate').value,
      deduct_if_resign_before_years: document.getElementById('chargeYears').value,
      note: document.getElementById('chargeNote').value.trim()
    };

    if (!data.employee_code) return alert('กรุณากรอกรหัสพนักงาน');
    if (!data.charge_name) return alert('กรุณากรอกชื่อรายการ');
    if (!data.amount) return alert('กรุณากรอกจำนวนเงิน');
    if (!data.charge_event_date) return alert('กรุณาเลือกวันที่เกิดรายการ');

    const res = await callApi({
      action: 'saveEmployeeCharge',
      data: data
    });

    if (!res.success) {
      alert(res.message || 'บันทึกไม่สำเร็จ');
      return;
    }

    alert('บันทึกค่าใช้จ่ายเรียบร้อยแล้ว');
    renderAdmin();
  }

  async function renderEmployeeChargeList() {
  const res = await callApi({
    action: 'getEmployeeChargesAdminData',
    line_uid: lineUid
  });

  if (!res.success) {
    alert(res.message || 'โหลดรายการไม่สำเร็จ');
    return;
  }

  const charges = res.charges || [];

  let html = `
    <div class="head">
      <div class="title">จัดการค่าใช้จ่าย</div>
      <div class="sub">ดูและปิดรายการที่หมดเงื่อนไขแล้ว</div>
    </div>

    <button class="btn-back" onclick="renderAdmin()">กลับ</button>
    <br><br>
  `;

  if (!charges.length) {
    html += `<div class="head">ยังไม่มีรายการค่าใช้จ่าย</div>`;
    document.getElementById('app').innerHTML = html;
    return;
  }

  charges.forEach(function(c) {
    const active = String(c.active || '').trim() === 'TRUE';
    const deducted = String(c.is_deducted || '').trim() === 'TRUE';

    let statusText = 'ปิดแล้ว';
    if (active && !deducted) statusText = 'ยังมีผล';
    if (deducted) statusText = 'หักแล้ว';

    html += `
      <div class="head">
        <b>${c.charge_name || c.charge_type || '-'}</b><br>
        ${c.employee_code || '-'} ${c.employee_name || ''}<br>
        จำนวนเงิน: ${Number(c.amount || 0).toLocaleString()} บาท<br>
        วันที่รายการ: ${formatDate(c.charge_event_date)}<br>
        ครบกำหนด: ${formatDate(c.expiry_date)}<br>
        สถานะ: <b>${statusText}</b><br>
        ${c.note ? 'หมายเหตุ: ' + c.note + '<br>' : ''}

        ${
          active && !deducted
            ? `<button class="btn-back" onclick="closeCharge('${c.charge_id}')">ปิดรายการ</button>`
            : ''
        }
      </div>
    `;
  });

  document.getElementById('app').innerHTML = html;
}

  async function closeCharge(chargeId) {
  if (!confirm('ยืนยันปิดรายการนี้?')) return;

  const res = await callApi({
    action: 'closeEmployeeCharge',
    data: {
      line_uid: lineUid,
      charge_id: chargeId
    }
  });

  if (!res.success) {
    alert(res.message || 'ปิดรายการไม่สำเร็จ');
    return;
  }

  alert('ปิดรายการเรียบร้อยแล้ว');
  renderEmployeeChargeList();
}

  function formatDate(value) {
  if (!value) return '-';

  const d = new Date(value);
  if (isNaN(d.getTime())) return value;

  return d.toLocaleDateString('th-TH', {
    year: 'numeric',
    month: 'short',
    day: 'numeric'
  });
}

  function showError(message) {
    document.getElementById('app').innerHTML = `
      <div class="error">${message}</div>
    `;
  }

  main();
</script>
  
</body>
</html>
