    profile: 'https://liff.line.me/2010317944-KmmsVa0F'
  };

    
async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      lineUid = profile.userId;

      await loadUserAndRenderPortal();

    } catch (err) {
      showError(err.message || err);
    }
  }

    
async function callApi(payload) {
  try {
    const res = await fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    try {
      return JSON.parse(text);
    } catch (err) {
      return {
        success: false,
        message: 'API ไม่ได้ส่ง JSON กลับมา: ' + text.slice(0, 200)
      };
    }

  } catch (err) {
    return {
      success: false,
      message: 'เชื่อมต่อ API ไม่สำเร็จ: ' + err.message
    };
  }
}

    
async function loadUserAndRenderPortal() {
  showLoading('กำลังตรวจสอบสิทธิ์...');

  const res = await callApi({
    action: 'getCurrentEmployee',
    line_uid: lineUid
  });

  if (!res.success) {
    showError(res.message || 'ไม่พบข้อมูลผู้ใช้งาน');
    return;
  }

  const user = res.employee || res.user || res;
  renderPortalByRole(user);
}


function showLoading(message) {
  document.getElementById('app').innerHTML = `
    <div class="loading">${message || 'กำลังโหลด...'}</div>
  `;
}

    
function renderPortalByRole(user) {
  const role = String(user.role || '').trim().toUpperCase();
  const name = user.nickname || user.first_name || user.employee_code || '';

  if (role === 'MANAGER') {
    renderManagerPortal(name);
    return;
  }

  if (role === 'OWNER' || role === 'HR') {
    renderAdminPortal(name);
    return;
  }

  if (role === 'STAFF') {
    window.location.href = 'https://liff.line.me/2010317944-48vTQqDt';
    return;
  }

  showError('คุณไม่มีสิทธิ์ใช้งานหน้านี้');
  }

async function renderEmployeeChargeForm() {
  const res = await callApi({
    action: 'getChargeAdminData',
    line_uid: lineUid
  });

  if (!res.success) {
    alert(res.message || 'โหลดรายชื่อพนักงานไม่สำเร็จ');
    return;
  }

  const employees = res.employees || [];

  const employeeOptions = employees.map(function(e) {
    const name = `${e.employee_code} - ${e.nickname || e.first_name || ''} ${e.last_name || ''}`;
    return `<option value="${e.employee_code}">${name}</option>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="head">
      <div class="title">ค่าใช้จ่ายพนักงาน</div>
      <div class="sub">เพิ่มรายการที่มีผลผูกพัน เช่น ยูนิฟอร์ม / ตรวจสุขภาพ</div>
    </div>

    <div class="section">
      <label class="label">เลือกพนักงาน</label>
      <select id="chargeEmployeeCode" class="input">
        <option value="">เลือกพนักงาน</option>
        ${employeeOptions}
      </select>

      <label class="label">ประเภทค่าใช้จ่าย</label>
      <select id="chargeType" class="input">
        <option value="UNIFORM">ยูนิฟอร์ม</option>
        <option value="HEALTH_CHECK">ตรวจสุขภาพ</option>
        <option value="OTHER">อื่นๆ</option>
      </select>

      <label class="label">ชื่อรายการ</label>
      <input id="chargeName" class="input" placeholder="เช่น ยูนิฟอร์ม 1 ชุด">

      <label class="label">จำนวนเงิน</label>
      <input id="chargeAmount" class="input" type="number" placeholder="เช่น 500">

      <label class="label">วันที่เกิดรายการ</label>
      <input id="chargeEventDate" class="input" type="date">

      <label class="label">มีผลผูกพันกี่ปี</label>
      <input id="chargeYears" class="input" type="number" value="1">

      <label class="label">หมายเหตุ</label>
      <textarea id="chargeNote" class="input" rows="3"></textarea>

      <button class="btn-save" onclick="submitEmployeeCharge()">บันทึกค่าใช้จ่าย</button>

async function submitEmployeeCharge() {
    const data = {
      line_uid: lineUid,
      employee_code: document.getElementById('chargeEmployeeCode').value.trim(),
      charge_type: document.getElementById('chargeType').value,
      charge_name: document.getElementById('chargeName').value.trim(),
      amount: document.getElementById('chargeAmount').value,
      charge_event_date: document.getElementById('chargeEventDate').value,
      deduct_if_resign_before_years: document.getElementById('chargeYears').value,
      note: document.getElementById('chargeNote').value.trim()
    };

    if (!data.employee_code) return alert('กรุณากรอกรหัสพนักงาน');
    if (!data.charge_name) return alert('กรุณากรอกชื่อรายการ');
    if (!data.amount) return alert('กรุณากรอกจำนวนเงิน');
    if (!data.charge_event_date) return alert('กรุณาเลือกวันที่เกิดรายการ');

    const res = await callApi({
      action: 'saveEmployeeCharge',
      data: data
    });

    if (!res.success) {
      alert(res.message || 'บันทึกไม่สำเร็จ');
      return;
    }

    alert('บันทึกค่าใช้จ่ายเรียบร้อยแล้ว');
    await loadUserAndRenderPortal();
  }

    
async function renderEmployeeChargeList() {
  const res = await callApi({
    action: 'getEmployeeChargesAdminData',
    line_uid: lineUid
  });

  if (!res.success) {
    alert(res.message || 'โหลดรายการไม่สำเร็จ');
    return;
  }

  const charges = res.charges || [];

  let html = `
    <div class="head">
      <div class="title">จัดการค่าใช้จ่าย</div>
      <div class="sub">ดูและปิดรายการที่หมดเงื่อนไขแล้ว</div>
    </div>

    <button class="btn-back" onclick="loadUserAndRenderPortal()">กลับ</button>
    <br><br>
  `;

  if (!charges.length) {
    html += `<div class="head">ยังไม่มีรายการค่าใช้จ่าย</div>`;
    document.getElementById('app').innerHTML = html;
    return;
  }

  charges.forEach(function(c) {
    const active = String(c.active || '').trim() === 'TRUE';
    const deducted = String(c.is_deducted || '').trim() === 'TRUE';

    let statusText = 'ปิดแล้ว';
    if (active && !deducted) statusText = 'ยังมีผล';
    if (deducted) statusText = 'หักแล้ว';

    html += `
      <div class="head">
        <b>${c.charge_name || c.charge_type || '-'}</b><br>
        ${c.employee_code || '-'} ${c.employee_name || ''}<br>
        จำนวนเงิน: ${Number(c.amount || 0).toLocaleString()} บาท<br>
        วันที่รายการ: ${formatDate(c.charge_event_date)}<br>
        ครบกำหนด: ${formatDate(c.expiry_date)}<br>
        สถานะ: <b>${statusText}</b><br>
        ${c.note ? 'หมายเหตุ: ' + c.note + '<br>' : ''}

        ${
          active && !deducted
            ? `<button class="btn-back" onclick="closeCharge('${c.charge_id}')">ปิดรายการ</button>`
            : ''
        }
      </div>
    `;
  });

  document.getElementById('app').innerHTML = html;
}

      <label class="label">Payroll Period</label>

async function submitPayrollPeriod() {
  const payrollPeriod = document.getElementById('payrollPeriod').value.trim();

  if (!payrollPeriod) {
    alert('กรุณากรอก payroll_period เช่น 2026-06');
    return;
  }

  const res = await callApi({
    action: 'createPayrollPeriod',
    payroll_period: payrollPeriod
  });

  if (!res.success) {
    alert(res.message || 'สร้างงวดไม่สำเร็จ');
    return;
  }

  alert(
    'สร้างงวดเรียบร้อยแล้ว\\n' +
    'งวด: ' + res.payroll_period + '\\n' +
    'เริ่ม: ' + res.start_date + '\\n' +
    'สิ้นสุด: ' + res.end_date + '\\n' +
    'จ่าย: ' + res.pay_date
  );

  await loadUserAndRenderPortal();

async function exportPayrollCsv(payrollPeriod) {
  const res = await callApi({
    action: 'getPayrollExportData',
    line_uid: lineUid,
    payroll_period: payrollPeriod
  });

  if (!res.success) {
    alert(res.message || 'Export ไม่สำเร็จ');
    return;
  }

  const rows = res.rows || [];
  if (!rows.length) {
    alert('ไม่มีข้อมูลสำหรับ Export');
    return;
  }

  const headers = [
    'payroll_period',
    'employee_code',
    'full_name',
    'nickname',
    'branch_id',
    'position',
    'bank_name',
    'bank_account_no',
    'bank_account_name',
    'base_salary',
    'ot_amount',
    'gross_amount',
    'charge_deduct_amount',
    'absence_deduct_amount',
    'social_security_amount',
    'deduct_amount',
    'net_amount',
    'status'
  ];

  const csv = [
    headers.join(','),
    ...rows.map(function(row) {
      return headers.map(function(h) {
        const value = row[h] == null ? '' : String(row[h]);
        return '"' + value.replace(/"/g, '""') + '"';
      }).join(',');
    })
  ].join('\n');

  const blob = new Blob(['\uFEFF' + csv], {
    type: 'text/csv;charset=utf-8;'
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');

  a.href = url;
  a.download = 'payroll_' + payrollPeriod + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

            : ''
        }
        <br>
      `;
    });
  }

  html += `</div>`;

  html += `
    <div class="head">
      <b>ตารางงานถัดไป</b><br>
  `;

  if (!schedules.length) {
    html += `ไม่มีตารางงาน<br>`;
  } else {
    schedules.forEach(function(s) {
      html += `
        ${formatDate(s.date)} | ${s.shift_name || '-'} |
        ${s.start_time || '-'} - ${s.end_time || '-'}<br>
      `;
    });
  }

  html += `</div>`;

  html += `
    <div class="head">
      <b>เข้างานล่าสุด</b><br>
  `;

  if (!attendance.length) {
    html += `ไม่มีประวัติ<br>`;
  } else {
    attendance.forEach(function(a) {
      html += `
        ${formatDate(a.date)} | ${a.attendance_status || '-'} |
        สาย ${a.late_minutes || 0} นาที<br>
      `;
    });
  }

  html += `</div>`;

  document.getElementById('app').innerHTML = html;
}

async function submitExportReport() {
  const reportType = document.getElementById('exportReportType').value;
  const startDate = document.getElementById('exportStartDate').value;
  const endDate = document.getElementById('exportEndDate').value;

  if ((reportType === 'ATTENDANCE' || reportType === 'LEAVE') && (!startDate || !endDate)) {
    alert('กรุณาเลือกวันที่เริ่มต้นและสิ้นสุด');
    return;
  }

  const res = await callApi({
    action: 'exportHrReport',
    data: {
      report_type: reportType,
      start_date: startDate,
      end_date: endDate,
      user_code: 'ADMIN',
      user_name: 'ADMIN'
    }
  });

  if (!res.success) {
    alert(res.message || 'Export ไม่สำเร็จ');
    return;
  }

  document.getElementById('app').innerHTML = `
    <div class="head">
      <div class="title">Export สำเร็จ</div>
      <div class="sub">${res.file_name || ''}</div>
    </div>

}

    function renderTodayTeamOverview(data) {
  const area = document.getElementById('todayTeamArea');

  if (!data || !data.branches || !data.branches.length) {
    area.innerHTML = '<div class="empty">ไม่พบข้อมูลพนักงาน</div>';
    return;
  }

  let html = `
    <div class="date-label">วันที่ ${data.date}</div>
  `;

  data.branches.forEach(function(branch) {
    html += `
      <div class="branch-card">
        <div class="branch-head">
          <h2>${branch.branch_name}</h2>
          <span>${branch.total_active} คน</span>
        </div>

        <div class="summary-row">
          <span>เข้างานแล้ว ${branch.checked_in.length}</span>
          <span>ยังไม่เข้า ${branch.not_checked_in.length}</span>
          <span>ลา ${branch.on_leave.length}</span>
          <span>ออกงานแล้ว ${branch.checked_out.length}</span>
        </div>

        ${renderEmployeeGroup('เข้างานแล้ว', branch.checked_in)}
        ${renderEmployeeGroup('ยังไม่เข้า', branch.not_checked_in)}
        ${renderEmployeeGroup('ลา', branch.on_leave)}
        ${renderEmployeeGroup('ออกงานแล้ว', branch.checked_out)}
      </div>
    `;
  });

  area.innerHTML = html;
}

function renderEmployeeGroup(title, list) {
  if (!list || !list.length) return '';

  let html = `
    <div class="emp-group">
      <div class="emp-title">${title}</div>
      <ul>
  `;

  list.forEach(function(emp) {
    let extra = '';

    if (emp.last_time) {
      extra += ` <span class="muted">(${emp.last_time})</span>`;
    }

    if (emp.leave_type) {
      extra += ` <span class="muted">(${emp.leave_type})</span>`;
    }

    html += `<li>${emp.name}${extra}</li>`;
  });

  html += `
      </ul>
    </div>
  `;

  return html;
}
