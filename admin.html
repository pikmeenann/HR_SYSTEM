<body>

  <script>
  let lineUid = '';

  const LIFF_ID = '2010317944-82Rv6kVa';

  const GAS_API_URL =
    'https://script.google.com/macros/s/AKfycbzzm6lTF7aMi0ufzas0KV9l6g_ab-_UqCEHFvxe23l3R4DgLMDUDig60HssQg5WqGCN0A/exec';

const URLS = {
  hrDashboard: 'https://liff.line.me/2010317944-JT6WkNZ4',
  dashboard: 'https://liff.line.me/2010317944-qrJlENj0',
  employeeApprove: 'https://liff.line.me/2010317944-CjJMkJ3I',
  employeeList: 'https://liff.line.me/2010317944-Nwoclupm',
  employeeDetail: 'https://liff.line.me/2010317944-Iu21jArf',
  scheduleAdmin: 'https://liff.line.me/2010317944-Gkh7the0',
  leaveApprove: 'https://liff.line.me/2010317944-6koLiYjX',
  profile: 'https://liff.line.me/2010317944-KmmsVa0F'
};

  async function main() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      lineUid = profile.userId;

      await loadUserAndRenderPortal();

    } catch (err) {
      showError(err.message || err);
    }
  }

  async function callApi(payload) {
    const res = await fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });

    return await res.json();
  }

    async function loadUserAndRenderPortal() {
  const res = await callApi({
    action: 'getCurrentEmployee',
    line_uid: lineUid
  });

  if (!res.success) {
    showError(res.message || 'ไม่พบข้อมูลผู้ใช้งาน');
    return;
  }

  const user = res.employee || res.user || res;
  const role = String(user.role || '').trim();

  if (role === 'STAFF') {
    window.location.href = 'https://liff.line.me/2010317944-48vTQqDt';
    return;
  }

  renderPortalByRole(user);
}

function renderPortalByRole(user) {
  const role = String(user.role || '').trim().toUpperCase();
  const name = user.nickname || user.first_name || user.employee_code || '';

  if (role === 'MANAGER') {
    renderManagerPortal(name);
    return;
  }

  if (role === 'OWNER' || role === 'HR') {
    renderAdminPortal(name);
    return;
  }

  if (role === 'STAFF') {
    window.location.href = 'https://liff.line.me/2010317944-48vTQqDt';
    return;
  }

  showError('คุณไม่มีสิทธิ์ใช้งานหน้านี้');
}

}

    document.getElementById('app').innerHTML = `

      </div>

      <div class="section">

      <div class="section">

<button class="btn" onclick="renderPayrollPeriodForm()">

  async function renderEmployeeChargeForm() {
  const res = await callApi({
    action: 'getChargeAdminData',
    line_uid: lineUid
  });

  if (!res.success) {
    alert(res.message || 'โหลดรายชื่อพนักงานไม่สำเร็จ');
    return;
  }

  const employees = res.employees || [];

  const employeeOptions = employees.map(function(e) {
    const name = `${e.employee_code} - ${e.nickname || e.first_name || ''} ${e.last_name || ''}`;
    return `<option value="${e.employee_code}">${name}</option>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="head">
      <div class="title">ค่าใช้จ่ายพนักงาน</div>
      <div class="sub">เพิ่มรายการที่มีผลผูกพัน เช่น ยูนิฟอร์ม / ตรวจสุขภาพ</div>
    </div>

    <div class="section">
      <label class="label">เลือกพนักงาน</label>
      <select id="chargeEmployeeCode" class="input">
        <option value="">เลือกพนักงาน</option>
        ${employeeOptions}
      </select>

      <label class="label">ประเภทค่าใช้จ่าย</label>
      <select id="chargeType" class="input">
        <option value="UNIFORM">ยูนิฟอร์ม</option>
        <option value="HEALTH_CHECK">ตรวจสุขภาพ</option>
        <option value="OTHER">อื่นๆ</option>
      </select>

      <label class="label">ชื่อรายการ</label>
      <input id="chargeName" class="input" placeholder="เช่น ยูนิฟอร์ม 1 ชุด">

      <label class="label">จำนวนเงิน</label>
      <input id="chargeAmount" class="input" type="number" placeholder="เช่น 500">

      <label class="label">วันที่เกิดรายการ</label>
      <input id="chargeEventDate" class="input" type="date">

      <label class="label">มีผลผูกพันกี่ปี</label>
      <input id="chargeYears" class="input" type="number" value="1">

      <label class="label">หมายเหตุ</label>
      <textarea id="chargeNote" class="input" rows="3"></textarea>

      <button class="btn-save" onclick="submitEmployeeCharge()">บันทึกค่าใช้จ่าย</button>
      <button class="btn-back" onclick="loadUserAndRenderPortal()">กลับ</button>
    </div>
  `;
}

  async function submitEmployeeCharge() {
    const data = {
      line_uid: lineUid,
      employee_code: document.getElementById('chargeEmployeeCode').value.trim(),
      charge_type: document.getElementById('chargeType').value,
      charge_name: document.getElementById('chargeName').value.trim(),
      amount: document.getElementById('chargeAmount').value,
      charge_event_date: document.getElementById('chargeEventDate').value,
      deduct_if_resign_before_years: document.getElementById('chargeYears').value,
      note: document.getElementById('chargeNote').value.trim()
    };

    if (!data.employee_code) return alert('กรุณากรอกรหัสพนักงาน');
    if (!data.charge_name) return alert('กรุณากรอกชื่อรายการ');
    if (!data.amount) return alert('กรุณากรอกจำนวนเงิน');
    if (!data.charge_event_date) return alert('กรุณาเลือกวันที่เกิดรายการ');

    const res = await callApi({
      action: 'saveEmployeeCharge',
      data: data
    });

    if (!res.success) {
      alert(res.message || 'บันทึกไม่สำเร็จ');
      return;
    }

    alert('บันทึกค่าใช้จ่ายเรียบร้อยแล้ว');
    await loadUserAndRenderPortal();
  }

  async function renderEmployeeChargeList() {
  const res = await callApi({
    action: 'getEmployeeChargesAdminData',
    line_uid: lineUid
  });

  if (!res.success) {
    alert(res.message || 'โหลดรายการไม่สำเร็จ');
    return;
  }

  const charges = res.charges || [];

  let html = `
    <div class="head">
      <div class="title">จัดการค่าใช้จ่าย</div>
      <div class="sub">ดูและปิดรายการที่หมดเงื่อนไขแล้ว</div>
    </div>

    <button class="btn-back" onclick="loadUserAndRenderPortal()">กลับ</button>
    <br><br>
  `;

  if (!charges.length) {
    html += `<div class="head">ยังไม่มีรายการค่าใช้จ่าย</div>`;
    document.getElementById('app').innerHTML = html;
    return;
  }

  charges.forEach(function(c) {
    const active = String(c.active || '').trim() === 'TRUE';
    const deducted = String(c.is_deducted || '').trim() === 'TRUE';

    let statusText = 'ปิดแล้ว';
    if (active && !deducted) statusText = 'ยังมีผล';
    if (deducted) statusText = 'หักแล้ว';

    html += `
      <div class="head">
        <b>${c.charge_name || c.charge_type || '-'}</b><br>
        ${c.employee_code || '-'} ${c.employee_name || ''}<br>
        จำนวนเงิน: ${Number(c.amount || 0).toLocaleString()} บาท<br>
        วันที่รายการ: ${formatDate(c.charge_event_date)}<br>
        ครบกำหนด: ${formatDate(c.expiry_date)}<br>
        สถานะ: <b>${statusText}</b><br>
        ${c.note ? 'หมายเหตุ: ' + c.note + '<br>' : ''}

        ${
          active && !deducted
            ? `<button class="btn-back" onclick="closeCharge('${c.charge_id}')">ปิดรายการ</button>`
            : ''
        }
      </div>
    `;
  });

  document.getElementById('app').innerHTML = html;
}

function renderPayrollPeriodForm() {
  document.getElementById('app').innerHTML = `
    <div class="head">
      <div class="title">สร้างงวดเงินเดือน</div>
      <div class="sub">ระบบจะสร้างช่วงวันที่ 21 ถึง 20 ให้อัตโนมัติ</div>
    </div>

    <div class="section">
      <label class="label">Payroll Period</label>
      <input id="payrollPeriod" class="input" placeholder="เช่น 2026-06">

      <button class="btn-save" onclick="submitPayrollPeriod()">สร้างงวด</button>
      <button class="btn-back" onclick="loadUserAndRenderPortal()">กลับ</button>
    </div>
  `;
}

  async function submitPayrollPeriod() {
  const payrollPeriod = document.getElementById('payrollPeriod').value.trim();

  if (!payrollPeriod) {
    alert('กรุณากรอก payroll_period เช่น 2026-06');
    return;
  }

  const res = await callApi({
    action: 'createPayrollPeriod',
    payroll_period: payrollPeriod
  });

  if (!res.success) {
    alert(res.message || 'สร้างงวดไม่สำเร็จ');
    return;
  }

  alert(
    'สร้างงวดเรียบร้อยแล้ว\\n' +
    'งวด: ' + res.payroll_period + '\\n' +
    'เริ่ม: ' + res.start_date + '\\n' +
    'สิ้นสุด: ' + res.end_date + '\\n' +
    'จ่าย: ' + res.pay_date
  );

  await loadUserAndRenderPortal();
}

  
    
  async function closeCharge(chargeId) {
  if (!confirm('ยืนยันปิดรายการนี้?')) return;

  const res = await callApi({
    action: 'closeEmployeeCharge',
    data: {
      line_uid: lineUid,
      charge_id: chargeId
    }
  });

  if (!res.success) {
    alert(res.message || 'ปิดรายการไม่สำเร็จ');
    return;
  }

  alert('ปิดรายการเรียบร้อยแล้ว');
  renderEmployeeChargeList();
}

  function formatDate(value) {
  if (!value) return '-';

  const d = new Date(value);
  if (isNaN(d.getTime())) return value;

  return d.toLocaleDateString('th-TH', {
    year: 'numeric',
    month: 'short',
    day: 'numeric'
  });
}

    function renderPayrollSummaryResult(res) {
  const rows = res.rows || [];

  let html = `
    <div class="head">
      <div class="title">Payroll ${res.payroll_period}</div>
      <div class="sub">
        พนักงาน ${rows.length} คน<br>
        รวมสุทธิ ${Number(res.total_net_amount || 0).toLocaleString()} บาท
      </div>
    </div>

<button class="btn-save" onclick="exportPayrollCsv('${res.payroll_period}')">
  Export CSV
</button>
    <button class="btn-back" onclick="renderPayrollSummaryForm()">กลับ</button>
            <button class="btn-save" onclick="updatePayrollStatus('${res.payroll_period}', 'APPROVED')">
        อนุมัติ Payroll
        </button>
        <button class="btn-save" onclick="updatePayrollStatus('${res.payroll_period}', 'PAID')">
        Mark as Paid
        </button>
        <button class="btn-back" onclick="updatePayrollStatus('${res.payroll_period}', 'LOCKED')">
        Lock Payroll
        </button>
    <br><br>
  `;

  if (!rows.length) {
    html += `<div class="head">ยังไม่มีข้อมูล Payroll งวดนี้</div>`;
    document.getElementById('app').innerHTML = html;
    return;
  }

  rows.forEach(function(r) {
    html += `
      <div class="head">
        <b>${r.employee_code}</b> | ${r.branch_id || '-'}<br>
        วันทำงาน: ${r.work_days} |
        ขาด: ${r.absent_days} |
        ลา: ${r.leave_days}<br>
        สาย: ${r.late_count} ครั้ง / ${r.late_minutes} นาที<br>
        OT: ${r.ot_minutes} นาที = ${Number(r.ot_amount || 0).toLocaleString()} บาท<br>
        หักขาดงาน: ${Number(r.absence_deduct_amount || 0).toLocaleString()} บาท<br>
        เงินรวม: ${Number(r.gross_amount || 0).toLocaleString()} บาท<br>
        หักรวม: ${Number(r.deduct_amount || 0).toLocaleString()} บาท<br>
        <b>สุทธิ: ${Number(r.net_amount || 0).toLocaleString()} บาท</b><br>
        สถานะ: ${r.status || '-'}
        <button class="btn-back" onclick="viewPayrollLines('${r.payroll_period}', '${r.employee_code}')">
        ดูรายละเอียด
        </button>

      </div>
    `;
  });

  document.getElementById('app').innerHTML = html;
}

    async function viewPayrollLines(payrollPeriod, employeeCode) {
  const res = await callApi({
    action: 'getPayrollLines',
    line_uid: lineUid,
    payroll_period: payrollPeriod,
    employee_code: employeeCode
  });

  if (!res.success) {
    alert(res.message || 'โหลดรายละเอียดไม่สำเร็จ');
    return;
  }

  renderPayrollLinesResult(res);
}

    function renderPayrollLinesResult(res) {
  const lines = res.lines || [];

  let total = 0;

  let html = `
    <div class="head">
      <div class="title">${res.employee_code}</div>
      <div class="sub">รายละเอียด Payroll งวด ${res.payroll_period}</div>
    </div>

    <button class="btn-back" onclick="renderPayrollSummaryForm()">กลับ</button>
    <br><br>
  `;

  if (!lines.length) {
    html += `<div class="head">ยังไม่มีรายละเอียด</div>`;
    document.getElementById('app').innerHTML = html;
    return;
  }

  lines.forEach(function(line) {
    total += Number(line.amount || 0);

    const amountText = Number(line.amount || 0).toLocaleString();

    html += `
      <div class="head">
        <b>${line.description || line.line_type}</b><br>
        ประเภท: ${line.line_type || '-'}<br>
        จำนวน: <b>${amountText} บาท</b><br>
        ${line.note ? 'หมายเหตุ: ' + line.note + '<br>' : ''}
      </div>
    `;
  });

  html += `
    <div class="head">
      <b>รวมรายการ: ${Number(total || 0).toLocaleString()} บาท</b>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
}

    async function updatePayrollStatus(payrollPeriod, status) {
  if (!confirm('ยืนยันเปลี่ยนสถานะงวด ' + payrollPeriod + ' เป็น ' + status + ' ?')) {
    return;
  }

  const res = await callApi({
    action: 'updatePayrollStatus',
    data: {
      line_uid: lineUid,
      payroll_period: payrollPeriod,
      status: status
    }
  });

  if (!res.success) {
    alert(res.message || 'อัปเดตสถานะไม่สำเร็จ');
    return;
  }

  alert('อัปเดตสถานะเป็น ' + status + ' แล้ว');
  renderPayrollSummaryForm();
}

    async function exportPayrollCsv(payrollPeriod) {
  const res = await callApi({
    action: 'getPayrollExportData',
    line_uid: lineUid,
    payroll_period: payrollPeriod
  });

  if (!res.success) {
    alert(res.message || 'Export ไม่สำเร็จ');
    return;
  }

  const rows = res.rows || [];
  if (!rows.length) {
    alert('ไม่มีข้อมูลสำหรับ Export');
    return;
  }

  const headers = [
    'payroll_period',
    'employee_code',
    'full_name',
    'nickname',
    'branch_id',
    'position',
    'bank_name',
    'bank_account_no',
    'bank_account_name',
    'base_salary',
    'ot_amount',
    'gross_amount',
    'charge_deduct_amount',
    'absence_deduct_amount',
    'social_security_amount',
    'deduct_amount',
    'net_amount',
    'status'
  ];

  const csv = [
    headers.join(','),
    ...rows.map(function(row) {
      return headers.map(function(h) {
        const value = row[h] == null ? '' : String(row[h]);
        return '"' + value.replace(/"/g, '""') + '"';
      }).join(',');
    })
  ].join('\n');

  const blob = new Blob(['\uFEFF' + csv], {
    type: 'text/csv;charset=utf-8;'
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');

  a.href = url;
  a.download = 'payroll_' + payrollPeriod + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

    async function renderAuditLogViewer() {
  const res = await callApi({
    action: 'getAuditLogs',
    limit: 100
  });

  if (!res.success) {
    alert(res.message || 'โหลด Audit Log ไม่สำเร็จ');
    return;
  }

  const logs = res.logs || [];

  let html = `
    <div class="head">
      <div class="title">Audit Log</div>
      <div class="sub">100 รายการล่าสุด</div>
    </div>

    <button class="btn-back" onclick="loadUserAndRenderPortal()">กลับ</button>
    <br><br>
  `;

  if (!logs.length) {
    html += `<div class="head">ยังไม่มีประวัติการแก้ไข</div>`;
    document.getElementById('app').innerHTML = html;
    return;
  }

  logs.forEach(function(log) {
    html += `
      <div class="head">
        <b>${log.action || '-'}</b><br>
        เวลา: ${formatDateTime(log.created_at || log.datetime)}<br>
        ผู้ใช้: ${log.user_name || log.user_code || '-'}<br>
        ตาราง: ${log.table_name || '-'}<br>
        รายการ: ${log.record_id || '-'}<br>
        ${log.note ? 'หมายเหตุ: ' + log.note + '<br>' : ''}
      </div>
    `;
  });

  document.getElementById('app').innerHTML = html;
}


function formatDateTime(value) {
  if (!value) return '-';

  const d = new Date(value);
  if (isNaN(d.getTime())) return value;

  return d.toLocaleString('th-TH', {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

  main();
