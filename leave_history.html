<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Leave History</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f7f3e8;
  color:#2f2f2f;
}

.wrap{
  max-width:430px;
  margin:0 auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:20px;
  margin-bottom:12px;
  box-shadow:0 8px 28px rgba(0,0,0,.08);
}

.title{
  font-size:24px;
  font-weight:800;
}

.sub{
  color:#777;
  font-size:14px;
  margin-top:4px;
}

.row{
  background:#fff;
  border-radius:18px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 4px 16px rgba(0,0,0,.06);
  line-height:1.7;
  font-size:14px;
}

.pill{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  margin-top:6px;
}

.PENDING{
  background:#fff4d9;
  color:#a06a00;
}

.APPROVED{
  background:#eaf8e4;
  color:#3e7f28;
}

.REJECTED{
  background:#ffe2e2;
  color:#b22222;
}

.loading,
.empty,
.error{
  text-align:center;
  padding:30px;
}

.error{
  color:#b22222;
}

.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.summary-box {
  background: #eef6e8;
  border-radius: 16px;
  padding: 12px;
  text-align: center;
}

.summary-box.orange {
  background: #fff0d6;
}

.summary-box.red {
  background: #ffe2e2;
}

.num {
  font-size: 24px;
  font-weight: 800;
}

.label {
  font-size: 12px;
  color: #666;
}

.leave-card {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.date-badge {
  width: 74px;
  min-width: 74px;
  border-radius: 18px;
  overflow: hidden;
  background: #fff;
  border: 1px solid #e5e5e5;
  box-shadow: 0 4px 14px rgba(0,0,0,.06);
  text-align: center;
}

.date-badge-month {
  background: #e85d5d;
  color: #fff;
  font-size: 12px;
  font-weight: 800;
  padding: 6px 2px;
}

.date-badge-day {
  font-size: 28px;
  font-weight: 900;
  padding: 10px 2px;
  line-height: 1;
}

.leave-content {
  flex: 1;
  min-width: 0;
}

.leave-title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 4px;
}

.leave-date-range {
  color: #555;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
}

.leave-meta {
  font-size: 14px;
  line-height: 1.7;
}
  
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <div class="title">ประวัติการลา</div>
    <div class="sub" id="employeeInfo">
      กำลังโหลด...
    </div>
  </div>

  <div id="app">
    <div class="card loading">
      กำลังโหลดข้อมูล...
    </div>
  </div>

</div>

<script>

const LIFF_ID = '2010317944-2vwp7PAW';

const GAS_API_URL =
'https://script.google.com/macros/s/AKfycbzzm6lTF7aMi0ufzas0KV9l6g_ab-_UqCEHFvxe23l3R4DgLMDUDig60HssQg5WqGCN0A/exec';

async function callApi(payload){
  const res = await fetch(GAS_API_URL,{
    method:'POST',
    body:JSON.stringify(payload)
  });

  return await res.json();
}

async function main(){

  try{

    await liff.init({
      liffId:LIFF_ID
    });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();

    const res = await callApi({
      action:'getMyLeaveHistory',
      line_uid:profile.userId
    });

    if(!res.success){
      showError(res.message);
      return;
    }

    renderHistory(res);

  }catch(err){
    showError(err.message || err);
  }
}

function translateStatus(status){

  const map = {
    PENDING:'รออนุมัติ',
    APPROVED:'อนุมัติแล้ว',
    REJECTED:'ไม่อนุมัติ'
  };

  return map[status] || status || '-';
}

function formatDate(value){

  if(!value) return '-';

  const d = new Date(value);

  if(isNaN(d.getTime())) return value;

  return d.toLocaleDateString('th-TH',{
    year:'numeric',
    month:'short',
    day:'numeric'
  });
}

function showError(message){

  document.getElementById('app').innerHTML =
  `
  <div class="card error">
    ${message}
  </div>
  `;
}

function renderHistory(res) {
  const emp = res.employee || {};
  const rows = res.rows || [];
  const summary = res.summary || {};

  document.getElementById('employeeInfo').innerHTML =
  `${emp.nickname || ''} · ${emp.employee_code || ''}<br>` +
  `รอบ ${formatFullThaiDate(res.range_start)} - ${formatFullThaiDate(res.range_end)}`;

  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="card">
      <div class="summary-grid">

        <div class="summary-box">
          <div class="num">${summary.sick_used || 0}</div>
          <div class="label">ลาป่วยใช้แล้ว</div>
        </div>

        <div class="summary-box">
          <div class="num">${summary.vacation_used || 0}</div>
          <div class="label">พักร้อนใช้แล้ว</div>
        </div>

        <div class="summary-box orange">
          <div class="num">${summary.pending_count || 0}</div>
          <div class="label">รออนุมัติ</div>
        </div>

        <div class="summary-box red">
          <div class="num">${summary.rejected_count || 0}</div>
          <div class="label">ไม่อนุมัติ</div>
        </div>

      </div>
    </div>

    ${
      rows.length
      ? rows.map(renderLeaveCard).join('')
      : '<div class="card empty">ยังไม่มีประวัติการลาในรอบนี้</div>'
    }
  `;
}

function renderLeaveCard(row) {
  const statusInfo = getLeaveStatusInfo(row.status);
  const badge = getDateBadgeInfo(row.start_date, row.end_date);

  return `
    <div class="card">
      <div class="leave-card">

        <div class="date-badge">
          <div class="date-badge-month">${badge.month}</div>
          <div class="date-badge-day">${badge.day}</div>
        </div>

        <div class="leave-content">

          <div class="leave-title">
            ${translateLeaveType(row.leave_type)}
          </div>

          <div class="leave-date-range">
            ${formatLeaveDateRange(row.start_date, row.end_date)}
          </div>

          <div class="leave-meta">
            จำนวนวัน: <b>${row.total_days || 0}</b><br>
            เหตุผล: ${row.reason || '-'}<br>
            สถานะ: ${statusInfo.icon} ${statusInfo.label}
          </div>

          ${
            row.note
            ? `
              <div style="margin-top:10px;color:#a33;font-size:14px;">
                หมายเหตุ:<br>${row.note}
              </div>
            `
            : ''
          }

        </div>
      </div>
    </div>
  `;
}

function translateLeaveType(type) {
  const map = {
    SICK: 'ลาป่วย',
    PERSONAL: 'ลากิจ',
    VACATION: 'พักร้อน',
    HOT: 'ใช้ HOT'
  };

  return map[type] || type || '-';
}

function getLeaveStatusInfo(status) {

  switch (status) {

    case 'APPROVED':
      return {
        icon: '🟢',
        label: 'อนุมัติแล้ว'
      };

    case 'PENDING':
      return {
        icon: '🟡',
        label: 'รออนุมัติ'
      };

    case 'REJECTED':
      return {
        icon: '🔴',
        label: 'ไม่อนุมัติ'
      };

    default:
      return {
        icon: '⚪',
        label: status || '-'
      };
  }
}

  function formatFullThaiDate(value) {
  if (!value) return '-';

  const d = new Date(value);
  if (isNaN(d.getTime())) return value;

  const weekdays = [
    'วันอาทิตย์',
    'วันจันทร์',
    'วันอังคาร',
    'วันพุธ',
    'วันพฤหัสบดี',
    'วันศุกร์',
    'วันเสาร์'
  ];

  const months = [
    'ม.ค.',
    'ก.พ.',
    'มี.ค.',
    'เม.ย.',
    'พ.ค.',
    'มิ.ย.',
    'ก.ค.',
    'ส.ค.',
    'ก.ย.',
    'ต.ค.',
    'พ.ย.',
    'ธ.ค.'
  ];

  return weekdays[d.getDay()] +
    'ที่ ' +
    d.getDate() +
    ' ' +
    months[d.getMonth()] +
    ' ' +
    String(d.getFullYear() + 543).slice(-2);
}

function getThaiMonthFull(monthIndex) {
  const months = [
    'มกราคม',
    'กุมภาพันธ์',
    'มีนาคม',
    'เมษายน',
    'พฤษภาคม',
    'มิถุนายน',
    'กรกฎาคม',
    'สิงหาคม',
    'กันยายน',
    'ตุลาคม',
    'พฤศจิกายน',
    'ธันวาคม'
  ];

  return months[monthIndex] || '';
}

function formatLeaveDateRange(startValue, endValue) {
  if (!startValue) return '-';

  const start = new Date(startValue);
  const end = endValue ? new Date(endValue) : start;

  if (isNaN(start.getTime())) return startValue;
  if (isNaN(end.getTime())) return startValue;

  const startDay = start.getDate();
  const endDay = end.getDate();

  const startMonth = getThaiMonthFull(start.getMonth());
  const endMonth = getThaiMonthFull(end.getMonth());

  const startYear = start.getFullYear() + 543;
  const endYear = end.getFullYear() + 543;

  if (
    start.getFullYear() === end.getFullYear() &&
    start.getMonth() === end.getMonth() &&
    startDay === endDay
  ) {
    return startDay + ' ' + startMonth + ' ' + startYear;
  }

  if (
    start.getFullYear() === end.getFullYear() &&
    start.getMonth() === end.getMonth()
  ) {
    return startDay + '-' + endDay + ' ' + startMonth + ' ' + startYear;
  }

  return startDay + ' ' + startMonth + ' ' + startYear +
    ' - ' +
    endDay + ' ' + endMonth + ' ' + endYear;
}

function getDateBadgeInfo(startValue, endValue) {
  if (!startValue) {
    return {
      day: '-',
      month: ''
    };
  }

  const start = new Date(startValue);
  const end = endValue ? new Date(endValue) : start;

  if (isNaN(start.getTime())) {
    return {
      day: '-',
      month: ''
    };
  }

  if (
    !isNaN(end.getTime()) &&
    start.getFullYear() === end.getFullYear() &&
    start.getMonth() === end.getMonth() &&
    start.getDate() !== end.getDate()
  ) {
    return {
      day: start.getDate() + '-' + end.getDate(),
      month: getThaiMonthFull(start.getMonth())
    };
  }

  return {
    day: start.getDate(),
    month: getThaiMonthFull(start.getMonth())
  };
}

main();

</script>

</body>
</html>
