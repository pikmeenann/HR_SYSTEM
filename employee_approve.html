<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Employee Approval</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:#f7f3e8; color:#333; }
    .wrap { max-width:460px; margin:auto; padding:20px; }
    .card { background:#fff; border-radius:24px; padding:20px; margin-bottom:14px; box-shadow:0 8px 28px rgba(0,0,0,.08); }
    .title { font-size:24px; font-weight:800; }
    .sub,.meta { color:#777; font-size:14px; line-height:1.6; }
    .name { font-size:18px; font-weight:800; margin-bottom:6px; }
    .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
    .btn { border:none; border-radius:16px; padding:14px; font-size:16px; font-weight:800; color:white; }
    .approve { background:#7fb069; }
    .reject { background:#d95d5d; }
    .loading,.empty,.error { text-align:center; padding:34px 10px; color:#777; }
    .error { color:#a33; background:#fff0f0; border-radius:16px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="title">อนุมัติพนักงาน</div>
      <div class="sub">รายการสมัครที่รออนุมัติ</div>
    </div>

    <div id="app">
      <div class="card loading">กำลังโหลด...</div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2010317944-CjJMkJ3I';

    const GAS_API_URL =
      'https://script.google.com/macros/s/AKfycbzzm6lTF7aMi0ufzas0KV9l6g_ab-_UqCEHFvxe23l3R4DgLMDUDig60HssQg5WqGCN0A/exec';

    let lineUid = '';

    async function callApi(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        lineUid = profile.userId;

        await loadRequests();

      } catch (err) {
        showError(err.message || err);
      }
    }

    async function loadRequests() {
      const app = document.getElementById('app');
      app.innerHTML = '<div class="card loading">กำลังโหลด...</div>';

      const res = await callApi({
        action: 'getPendingEmployeeRegistrations',
        line_uid: lineUid
      });

      if (!res.success) {
        showError(res.message || 'โหลดข้อมูลไม่สำเร็จ');
        return;
      }

      renderRequests(res.rows || []);
    }

    function renderRequests(rows) {
      const app = document.getElementById('app');

      if (!rows.length) {
        app.innerHTML = '<div class="card empty">ไม่มีรายการสมัครรออนุมัติ</div>';
        return;
      }

      app.innerHTML = rows.map(function(r) {
        return `
          <div class="card">
            <div class="name">${r.nickname || '-'} · ${r.home_branch_id || '-'}</div>
            <div class="meta">
              ชื่อ: ${r.first_name || ''} ${r.last_name || ''}<br>
              เบอร์: ${r.phone || '-'}<br>
              ประเภท: ${r.employee_type || '-'}<br>
              ภาษา: ${r.preferred_language || '-'}<br>
              ตำแหน่ง: ${r.position || '-'}<br>
              สมัครเมื่อ: ${formatDateTime(r.register_datetime)}
            </div>

            <div class="btn-row">
              <button class="btn approve" onclick="approveReg('${r.reg_id}')">อนุมัติ</button>
              <button class="btn reject" onclick="rejectReg('${r.reg_id}')">ปฏิเสธ</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function approveReg(regId) {
      if (!confirm('ยืนยันอนุมัติพนักงานนี้?')) return;

      const res = await callApi({
        action: 'approveEmployeeRegistrationByLiff',
        line_uid: lineUid,
        reg_id: regId
      });

      if (!res.success) {
        showError(res.message || 'อนุมัติไม่สำเร็จ');
        return;
      }

      alert(res.message || 'อนุมัติเรียบร้อย');
      await loadRequests();
    }

    async function rejectReg(regId) {
      const note = prompt('ระบุเหตุผลที่ปฏิเสธ');
      if (note === null) return;

      const res = await callApi({
        action: 'rejectEmployeeRegistrationByLiff',
        line_uid: lineUid,
        reg_id: regId,
        note: note || 'ปฏิเสธผ่าน LIFF'
      });

      if (!res.success) {
        showError(res.message || 'ปฏิเสธไม่สำเร็จ');
        return;
      }

      alert(res.message || 'ปฏิเสธเรียบร้อย');
      await loadRequests();
    }

    function formatDateTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;

      return d.toLocaleString('th-TH', {
        year:'numeric',
        month:'short',
        day:'numeric',
        hour:'2-digit',
        minute:'2-digit'
      });
    }

    function showError(message) {
      document.getElementById('app').innerHTML =
        '<div class="card error">' + message + '</div>';
    }

    main();
  </script>
</body>
</html>
