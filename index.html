<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Staff Check-in</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f3e8;
      color: #2f2f2f;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
    }

    .hello {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .sub {
      color: #777;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .pill {
      background: #eef6e8;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 18px;
      line-height: 1.7;
      font-size: 15px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      cursor: pointer;
      background: #7fb069;
      color: white;
    }

    .btn.orange {
      background: #f4a259;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .note {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
      margin-top: 12px;
    }

    .loading {
      text-align: center;
      padding: 40px 10px;
      color: #777;
    }

    .error {
      background: #fff0f0;
      color: #a33;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.6;
    }

    .label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin: 14px 0 6px;
      color: #555;
    }

    .input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      background: #fff;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card" id="app">
      <div class="loading">กำลังโหลดข้อมูล...</div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2010317944-48vTQqDt';

    const GAS_API_URL =
      'https://script.google.com/macros/s/AKfycbzzm6lTF7aMi0ufzas0KV9l6g_ab-_UqCEHFvxe23l3R4DgLMDUDig60HssQg5WqGCN0A/exec';

    let lineUid = '';
    let pageData = null;

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        lineUid = profile.userId;

        await loadAttendanceData();

      } catch (err) {
        showError(err.message || err);
      }
    }

    function renderRegistrationForm() {
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="hello">สมัครเข้าระบบพนักงาน</div>
    <div class="sub">กรอกข้อมูลเบื้องต้นเพื่อให้ HR อนุมัติ</div>

    <label>สาขา</label>
    <select id="regBranch" class="input">
      <option value="">เลือกสาขา</option>
      <option value="P EV">P EV - PikMee อีสท์วิลล์</option>
      <option value="P LP">P LP - PikMee ลาดพร้าว</option>
      <option value="P PK">P PK - PikMee ปิ่นเกล้า</option>
      <option value="P BN">P BN - PikMee บางนา</option>
      <option value="P R9">P R9 - PikMee พระราม9</option>
      <option value="P R3">P R3 - PikMee พระราม3</option>
      <option value="P FI">P FI - PikMee แฟชั่น</option>
      <option value="P SC">P SC - PikMee สีลม</option>
      <option value="P R2">P R2 - PikMee พระราม2</option>
      <option value="C EV">C EV - CadoCado อีสท์วิลล์</option>
      <option value="C LP">C LP - CadoCado ลาดพร้าว</option>
      <option value="C PK">C PK - CadoCado ปิ่นเกล้า</option>
      <option value="C BN">C BN - CadoCado บางนา</option>
      <option value="C R9">C R9 - CadoCado พระราม9</option>
      <option value="C R3">C R3 - CadoCado พระราม3</option>
      <option value="C CL">C CL - CadoCado ชิดลม</option>
      <option value="C R2">C R2 - CadoCado พระราม2</option>
    </select>

    <label>ชื่อเล่น</label>
    <input id="regNickname" class="input" placeholder="เช่น น้ำ">

    <label>ชื่อจริง</label>
    <input id="regFirstName" class="input" placeholder="ชื่อจริง">

    <label>นามสกุล</label>
    <input id="regLastName" class="input" placeholder="นามสกุล">

    <label>เบอร์โทร</label>
    <input id="regPhone" class="input" placeholder="เบอร์ที่ติดต่อได้" inputmode="tel">

    <label>ประเภทพนักงาน</label>
    <select id="regEmployeeType" class="input">
      <option value="THAI">คนไทย</option>
      <option value="FOREIGN_REGISTERED">ต่างชาติ มีเอกสาร</option>
      <option value="FOREIGN_UNREGISTERED">ต่างชาติ รอเอกสาร</option>
    </select>

    <label>ภาษา</label>
    <select id="regLanguage" class="input">
      <option value="TH">ไทย</option>
      <option value="MM">พม่า</option>
      <option value="LA">ลาว</option>
      <option value="EN">อังกฤษ</option>
    </select>

    <button class="btn" onclick="submitRegistration()">ส่งข้อมูลให้ HR</button>

    <div class="note">
      หลังส่งข้อมูลแล้ว กรุณารอ HR ตรวจสอบและอนุมัติก่อนใช้งานระบบเช็คอิน
    </div>
  `;
}

    async function submitRegistration() {
  const data = {
    line_uid: lineUid,
    line_display_name: '',
    line_picture_url: '',
    home_branch_id: document.getElementById('regBranch').value,
    nickname: document.getElementById('regNickname').value.trim(),
    first_name: document.getElementById('regFirstName').value.trim(),
    last_name: document.getElementById('regLastName').value.trim(),
    phone: document.getElementById('regPhone').value.trim(),
    employee_type: document.getElementById('regEmployeeType').value,
    preferred_language: document.getElementById('regLanguage').value,
    position: 'Staff',
    note: 'สมัครผ่าน LIFF'
  };

  if (!data.home_branch_id || !data.nickname || !data.first_name || !data.last_name) {
    alert('กรุณากรอก สาขา / ชื่อเล่น / ชื่อจริง / นามสกุล');
    return;
  }

  showLoading('กำลังส่งข้อมูลให้ HR...');

  try {
    const res = await callApi({
      action: 'registerEmployeeRequest',
      data: data
    });

    if (!res.success) {
      showError(res.message || 'ส่งข้อมูลไม่สำเร็จ');
      return;
    }

    document.getElementById('app').innerHTML = `
      <div class="hello">ส่งข้อมูลเรียบร้อย</div>
      <div class="pill">
        ระบบได้รับข้อมูลสมัครของคุณแล้ว<br>
        กรุณารอ HR ตรวจสอบและอนุมัติ
      </div>
    `;

  } catch (err) {
    showError(err.message || err);
  }
}

    async function callApi(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      return await res.json();
    }

    async function loadAttendanceData() {
      showLoading('กำลังโหลดข้อมูลพนักงาน...');

      const res = await callApi({
        action: 'getAttendancePageData',
        line_uid: lineUid
      });

      pageData = res;
      render(res);
    }

    function render(res) {
  const app = document.getElementById('app');

  if (!res.success) {
  if (res.message && res.message.indexOf('ไม่พบข้อมูลพนักงาน') !== -1) {
    renderRegistrationForm();
  } else {
    showError(res.message || 'โหลดข้อมูลไม่สำเร็จ');
  }
  return;
}

  const buttons = res.buttons.map(function(btn, index) {
    const color = index === 0 ? '' : 'orange';
    return `
      <button class="btn ${color}" onclick="submitAction('${btn.action}')">
        ${btn.label}
      </button>
    `;
  }).join('');

  app.innerHTML = `
    <div class="hello">สวัสดี ${res.nickname || ''}</div>
    <div class="sub">สาขา ${res.branch_id || '-'}</div>

    <div class="pill">
      สถานะตอนนี้: <b>${translateStatus(res.current_status)}</b><br>
      รายการล่าสุด: ${translateAction(res.last_action) || '-'}<br>
      เวลา: ${formatTime(res.last_action_time)}
    </div>

    ${buttons || '<div class="note">วันนี้บันทึกครบแล้ว</div>'}

    <div class="note">
      ระบบจะบันทึกเวลา ตำแหน่ง และรูปถ่ายเพื่อยืนยันการเข้างาน
    </div>
  `;
}

    async function submitAction(action) {
  const ok = confirm('ยืนยันทำรายการนี้?');
  if (!ok) return;

  const photoBase64 = await captureFreshPhoto();
  if (!photoBase64) return;

  try {
    showLoading('กำลังตรวจตำแหน่ง...');

    const gps = await getCurrentLocation();

    showLoading('กำลังบันทึกข้อมูล...');

    const res = await callApi({
  action: 'recordAttendanceAction',
  data: {
    employee_code: pageData.employee_code,
    check_type: action,
    gps_lat: gps.lat,
    gps_lng: gps.lng,
    photo_base64: photoBase64,
    device_info: navigator.userAgent,
    os: getOS(),
    app_version: 'LIFF_V2_CAMERA',
    note: 'บันทึกจาก LIFF พร้อมรูปถ่าย'
  }
});

alert(JSON.stringify(res));

    if (!res.success) {
      showError(res.message || 'บันทึกไม่สำเร็จ');
      return;
    }

    alert('บันทึกสำเร็จ');
    await loadAttendanceData();

  } catch (err) {
    showError(err.message || err);
  }
}

    function getCurrentLocation() {
      return new Promise(function(resolve, reject) {
        if (!navigator.geolocation) {
          reject(new Error('เครื่องนี้ไม่รองรับ GPS'));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          function(pos) {
            resolve({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude
            });
          },
          function(err) {
            reject(new Error('ไม่สามารถอ่านตำแหน่งได้ กรุณาอนุญาต GPS'));
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          }
        );
      });
    }

    function translateStatus(status) {
      const map = {
        NOT_CHECKED_IN: 'ยังไม่เข้างาน',
        WORKING: 'กำลังทำงาน',
        ON_BREAK: 'กำลังพัก',
        CHECKED_OUT: 'ออกงานแล้ว',
        MISSING_CHECKOUT: 'ยังไม่ได้เช็คเอาท์'
      };

      return map[status] || status || '-';
    }

    function translateAction(action) {
      const map = {
        CHECK_IN: 'เช็คอินเข้างาน',
        BREAK_OUT: 'ไปพัก',
        BREAK_IN: 'กลับเข้าทำงาน',
        CHECK_OUT: 'เช็คเอาท์ออกงาน'
      };

      return map[action] || action || '-';
    }

    function formatTime(value) {
      if (!value) return '-';

      const d = new Date(value);

      if (isNaN(d.getTime())) return value;

      return d.toLocaleTimeString('th-TH', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getOS() {
      const ua = navigator.userAgent || '';

      if (/android/i.test(ua)) return 'Android';
      if (/iPad|iPhone|iPod/.test(ua)) return 'iOS';
      if (/Windows/.test(ua)) return 'Windows';
      if (/Mac/.test(ua)) return 'Mac';

      return 'Unknown';
    }

    function showLoading(text) {
      document.getElementById('app').innerHTML = `
        <div class="loading">${text || 'กำลังโหลด...'}</div>
      `;
    }

    function showError(message) {
      document.getElementById('app').innerHTML = `
        <div class="error">
          ${message}
          <br><br>
          <button class="btn" onclick="main()">ลองใหม่</button>
        </div>
      `;
    }

function captureFreshPhoto() {
  return new Promise(function(resolve) {
    const app = document.getElementById('app');

    app.innerHTML = `
      <div class="hello">ถ่ายรูปยืนยัน</div>
      <div class="sub">กรุณาถ่ายรูปสดก่อนบันทึกเวลา</div>

      <video id="cameraPreview" autoplay playsinline style="
        width:100%;
        border-radius:20px;
        background:#000;
        margin-bottom:14px;
      "></video>

      <canvas id="photoCanvas" style="display:none;"></canvas>

      <button class="btn" id="takePhotoBtn">📸 ถ่ายรูป</button>
      <button class="btn orange" id="cancelPhotoBtn">ยกเลิก</button>

      <div class="note">
        ต้องถ่ายรูปจากกล้องเท่านั้น ไม่สามารถเลือกรูปจากอัลบั้มได้
      </div>
    `;

    const video = document.getElementById('cameraPreview');
    const canvas = document.getElementById('photoCanvas');
    const takeBtn = document.getElementById('takePhotoBtn');
    const cancelBtn = document.getElementById('cancelPhotoBtn');

    let stream = null;

    navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'user'
      },
      audio: false
    })
    .then(function(s) {
      stream = s;
      video.srcObject = stream;
    })
    .catch(function(err) {
      showError('ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการใช้งานกล้อง');
      resolve(null);
    });

    takeBtn.onclick = function() {
      if (!stream) {
        alert('กล้องยังไม่พร้อม');
        return;
      }

      const width = video.videoWidth || 720;
      const height = video.videoHeight || 960;

      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, width, height);

      const photoBase64 = canvas.toDataURL('image/jpeg', 0.82);

      stopCameraStream(stream);

      resolve(photoBase64);
    };

    cancelBtn.onclick = function() {
      if (stream) stopCameraStream(stream);
      loadAttendanceData();
      resolve(null);
    };
  });
}


function stopCameraStream(stream) {
  stream.getTracks().forEach(function(track) {
    track.stop();
  });
}
    
    main();
  </script>
</body>
</html>
