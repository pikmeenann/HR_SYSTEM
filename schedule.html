<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>My Schedule</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f7f3e8;
      font-family: Arial, sans-serif;
      color: #333;
    }

    .wrap {
      max-width: 460px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,.08);
    }

    .title {
      font-size: 24px;
      font-weight: 800;
    }

    .sub {
      color: #777;
      margin-top: 4px;
    }

    .day {
      border-left: 6px solid #7fb069;
    }

    .off {
      border-left: 6px solid #d95d5d;
    }

    .date {
      font-size: 18px;
      font-weight: 800;
    }

    .shift {
      margin-top: 8px;
      font-size: 15px;
      line-height: 1.7;
    }

    .loading,
    .error {
      text-align: center;
      padding: 40px 10px;
      color: #777;
    }

    .error {
      color: #a33;
      background: #fff0f0;
      border-radius: 16px;
    }

    .ot-box {
      background: #eef6e8;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
      font-size: 15px;
      color: #2f6b2f;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }

    .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 4px;
    }

    .dot.work { background: #ddd; }
    .dot.off { background: #f4b6b6; }
    .dot.holiday { background: #b8e8b8; }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border: 1px solid #ddd;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
    }

    .day-head {
      background: #eef6e8;
      padding: 8px 2px;
      text-align: center;
      font-size: 11px;
      font-weight: 800;
      border-right: 1px solid #ddd;
    }

    .day-cell {
      height: 82px;
      min-width: 0;
      padding: 6px 3px;
      border-top: 1px solid #ddd;
      border-right: 1px solid #ddd;
      font-size: 10px;
      background: #fff;
      overflow: hidden;
    }

    .day-cell.off {
      background: #ffe2e2;
      color: #b22222;
    }

    .day-cell.holiday {
      background: #e4f6df;
      color: #2f6b2f;
    }

    .day-num {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .shift-time {
      font-size: 10px;
      line-height: 1.3;
      word-break: keep-all;
    }

    .empty-cell {
      background: #fafafa;
    }

    .day-cell.off .day-num {
      color: #b22222;
    }

    .day-cell.off b {
      color: #b22222;
    }

    .day-cell.holiday .day-num {
      color: #2f8f2f;
    }

    .day-cell.holiday b {
      color: #2f8f2f;
    }
    
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="title">ตารางงานของฉัน</div>
      <div class="sub" id="rangeText">รอบการทำงาน</div>
    </div>

    <div id="app">
      <div class="card loading">กำลังโหลด...</div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2010317944-can2Dq6e';

    const GAS_API_URL =
      'https://script.google.com/macros/s/AKfycbzzm6lTF7aMi0ufzas0KV9l6g_ab-_UqCEHFvxe23l3R4DgLMDUDig60HssQg5WqGCN0A/exec';

    async function callApi(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      return await res.json();
    }

    async function main() {
      try {
        await liff.init({
          liffId: LIFF_ID
        });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        const result = await callApi({
          action: 'getMySchedule',
          line_uid: profile.userId
        });

        renderSchedule(result);

      } catch (err) {
        showError(err.message || err);
      }
    }

    function render(result) {
      const app = document.getElementById('app');

      if (!result.success) {
        showError(result.message || 'โหลดตารางงานไม่สำเร็จ');
        return;
      }

      document.getElementById('rangeText').innerText =
        formatFullThaiDate(result.range_start) + ' - ' + formatFullThaiDate(result.range_end);

      if (!result.days || !result.days.length) {
        app.innerHTML =
          '<div class="card loading">ยังไม่มีตารางงานในรอบนี้<br>กรุณารอ Manager ลงตารางงานให้</div>';
        return;
      }

      app.innerHTML = result.days.map(function(d) {
        const isOff =
          String(d.is_off_day).toUpperCase() === 'TRUE' ||
          d.is_off_day === true;

        return `
          <div class="card ${isOff ? 'off' : 'day'}">
            <div class="date">${formatDate(d.date)}</div>

            <div class="shift">
              ${
                isOff
                  ? 'วันหยุด'
                  : `
                    กะ: ${translateShiftName(d.shift_name)}<br>
                    ${renderScheduleText(d)}
                    สาขา: ${d.branch_id || '-'}
                  `
              }
              ${d.note ? '<br>หมายเหตุ: ' + d.note : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function formatDate(value) {
      if (!value) return '-';

      const d = new Date(value);
      if (isNaN(d.getTime())) return value;

      return d.toLocaleDateString('th-TH', {
        weekday: 'long',
        day: 'numeric',
        month: 'short'
      });
    }

    function formatTimeOnly(value) {
      if (!value) return '-';

      if (typeof value === 'string') {
        return value;
      }

      const d = new Date(value);
      if (isNaN(d.getTime())) return value;

      return d.toLocaleTimeString('th-TH', {
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function showError(message) {
      document.getElementById('app').innerHTML =
        '<div class="card error">' + message + '</div>';
    }

    function translateShiftName(shiftName) {
  const map = {
    MORNING: 'กะเช้า',
    LATE_MORNING: 'กะสาย',
    AFTERNOON: 'กะบ่าย',
    EVENING: 'กะเย็น',
    NIGHT: 'กะดึก',
    OFF: 'วันหยุด',
    LEAVE: 'ลา',
    SPECIAL: 'กะพิเศษ'
  };

  return map[shiftName] || shiftName || '-';
}

    function renderScheduleText(d) {
  const shift = String(d.shift_name || '').trim();

  if (shift === 'OFF') {
    return 'วันหยุด';
  }

  if (shift === 'LEAVE') {
    return 'ลา';
  }

  if (shift === 'SPECIAL') {
    return `
      เวลาพิเศษ: ${formatTimeOnly(d.start_time)} - ${formatTimeOnly(d.end_time)}<br>
      สาขา: ${d.branch_id || '-'}
    `;
  }

  return `
    เวลาเข้างาน: ${formatTimeOnly(d.start_time)}<br>
    เวลาออกงาน: ${formatTimeOnly(d.end_time)}<br>
    สาขา: ${d.branch_id || '-'}
  `;
}

    function renderSchedule(result) {
  const app = document.getElementById('app');

  document.getElementById('rangeText').innerText =
    formatFullThaiDate(result.range_start) + ' - ' + formatFullThaiDate(result.range_end);

  const days = result.days || [];
  const holidays = result.holidays || [];

  if (!days.length) {
    app.innerHTML =
      '<div class="card loading">ยังไม่มีตารางงานในรอบนี้<br>กรุณารอ Manager ลงตารางงานให้</div>';
    return;
  }

  const scheduleMap = {};
  days.forEach(function(d) {
    scheduleMap[toDateText(new Date(d.date))] = d;
  });

  const holidayMap = {};
  holidays.forEach(function(h) {
    holidayMap[h.date] = h;
  });

  app.innerHTML = `
    <div class="card">
      <div class="ot-box">
        โอทีที่คาดว่าจะได้รับ หากเข้างานตรงตามตารางนี้:
        <b>${calculateEstimatedOt(days)} ชั่วโมง</b>
      </div>

      <div class="legend">
        <span><i class="dot work"></i> วันทำงาน</span>
        <span><i class="dot off"></i> วันหยุดประจำสัปดาห์</span>
        <span><i class="dot holiday"></i> วันนักขัตฤกษ์</span>
      </div>

      ${buildCalendarHtml(result.range_start, result.range_end, scheduleMap, holidayMap)}
    </div>
  `;
}

    function formatFullThaiDate(value) {
  if (!value) return '-';

  const d = new Date(value);
  if (isNaN(d.getTime())) return value;

  const weekdays = [
    'วันอาทิตย์',
    'วันจันทร์',
    'วันอังคาร',
    'วันพุธ',
    'วันพฤหัสบดี',
    'วันศุกร์',
    'วันเสาร์'
  ];

  const months = [
    'ม.ค.',
    'ก.พ.',
    'มี.ค.',
    'เม.ย.',
    'พ.ค.',
    'มิ.ย.',
    'ก.ค.',
    'ส.ค.',
    'ก.ย.',
    'ต.ค.',
    'พ.ย.',
    'ธ.ค.'
  ];

  const dayName = weekdays[d.getDay()];
  const day = d.getDate();
  const month = months[d.getMonth()];
  const year = String(d.getFullYear() + 543).slice(-2);

  return dayName + 'ที่ ' + day + ' ' + month + ' ' + year;
}

function buildCalendarHtml(startText, endText, scheduleMap, holidayMap) {
  const weekHeads = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];

  const start = new Date(startText);
  const end = new Date(endText);

  const first = new Date(start);
  const day = first.getDay(); // Sun=0
  const mondayOffset = day === 0 ? -6 : 1 - day;
  first.setDate(first.getDate() + mondayOffset);

  let html = '<div class="calendar">';

  weekHeads.forEach(function(w) {
    html += '<div class="day-head">' + w + '</div>';
  });

  const current = new Date(first);

  while (current <= end || current.getDay() !== 1) {
    const dateText = toDateText(current);
    const inRange = current >= start && current <= end;
    const sch = scheduleMap[dateText];
    const holiday = holidayMap[dateText];

    const isOffDay =
      sch &&
      (
        sch.is_off_day === true ||
        String(sch.is_off_day).toUpperCase() === 'TRUE'
      );

    let cls = 'day-cell';
    let content = '';

    if (!inRange) {
      cls += ' empty-cell';
      content = '';
   } else if (isOffDay) {
      cls += ' off';
      content = '<div class="day-num">' + current.getDate() + '</div><b>วันหยุดประจำสัปดาห์</b>';
    } else if (holiday) {
      cls += ' holiday';
      content =
        '<div class="day-num">' + current.getDate() + '</div>' +
        '<b>HOT</b><br>' +
        '<span class="shift-time">' + getShiftText(sch) + '</span>';
    } else {
      content =
        '<div class="day-num">' + current.getDate() + '</div>' +
        '<span class="shift-time">' + getShiftText(sch) + '</span>';
    }

    html += '<div class="' + cls + '">' + content + '</div>';

    current.setDate(current.getDate() + 1);

    if (current > end && current.getDay() === 1) break;
  }

  html += '</div>';
  return html;
}

function getShiftText(sch) {
  if (!sch) return '';

  if (String(sch.shift_name).toUpperCase() === 'LEAVE') {
    return 'ลา';
  }

  const start = sch.start_time || '-';
  const end = sch.end_time || '-';

  return start + ' - ' + end;
}

function calculateEstimatedOt(days) {
  let total = 0;

  days.forEach(function(d) {
    if (!d.start_time || !d.end_time) return;
    if (String(d.shift_name).toUpperCase() === 'OFF') return;
    if (String(d.shift_name).toUpperCase() === 'LEAVE') return;

    const minutes = diffMinutes(d.start_time, d.end_time);
    const breakMinutes = Number(d.break_minutes || 0);
    const workHours = (minutes - breakMinutes) / 60;

    if (workHours > 8) {
      total += workHours - 8;
    }
  });

  return Math.max(0, total).toFixed(2);
}

function diffMinutes(start, end) {
  const s = String(start).split(':');
  const e = String(end).split(':');

  const sm = Number(s[0]) * 60 + Number(s[1] || 0);
  const em = Number(e[0]) * 60 + Number(e[1] || 0);

  return em >= sm ? em - sm : em + 1440 - sm;
}

function toDateText(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');

  return y + '-' + m + '-' + day;
}
    
    main();
  </script>
</body>
</html>
