<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>My Profile</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f3e8;
      color: #2f2f2f;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }

    .hello {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .sub {
      color: #777;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .info {
      background: #eef6e8;
      border-radius: 18px;
      padding: 14px;
      line-height: 1.8;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .box {
      background: #fff7e8;
      border-radius: 18px;
      padding: 16px;
      text-align: center;
    }

    .num {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .label {
      font-size: 13px;
      color: #666;
    }

    .loading,
    .error {
      text-align: center;
      padding: 40px 10px;
      color: #777;
    }

    .error {
      background: #fff0f0;
      color: #a33;
      border-radius: 16px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px;
      font-size: 16px;
      font-weight: 800;
      background: #7fb069;
      color: white;
      margin-top: 14px;
    }

    .grid.profile-kpi {
      grid-template-columns: 1fr 1fr;
    }

    .box.late-box {
      grid-column: span 2;
      background: #ffeedd;
    }

    .btn-sub {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-top: 4px;
      opacity: 0.9;
    }
    
  </style>
</head>

<body>
  <div class="wrap">
    <div id="app" class="card">
      <div class="loading">กำลังโหลดข้อมูล...</div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2010317944-KmmsVa0F';

    const GAS_API_URL =
      'https://script.google.com/macros/s/AKfycbzzm6lTF7aMi0ufzas0KV9l6g_ab-_UqCEHFvxe23l3R4DgLMDUDig60HssQg5WqGCN0A/exec';

    let lineUid = '';

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        lineUid = profile.userId;

        const res = await callApi({
          action: 'getMyProfile',
          line_uid: lineUid
        });

        if (!res.success) {
          showError(res.message || 'โหลดข้อมูลไม่สำเร็จ');
          return;
        }

        renderProfile(res);

      } catch (err) {
        showError(err.message || err);
      }
    }

    async function callApi(payload) {
      const res = await fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      return await res.json();
    }

    function renderProfile(res) {
      const p = res.profile || {};
      const l = res.leave_balance || {};
      const app = document.getElementById('app');

      app.innerHTML = `
        <div class="hello">สวัสดี ${p.nickname || ''}</div>
        <div class="sub">ข้อมูลพนักงานของฉัน</div>

        <div class="info">
          รหัสพนักงาน: <b>${p.employee_code || '-'}</b><br>
          ชื่อ: ${p.first_name || ''} ${p.last_name || ''}<br>
          สาขา: ${p.branch_name || p.branch_id || '-'}<br>
          ตำแหน่ง: ${p.position || '-'}<br>
          เริ่มงาน: ${formatDate(p.start_date)}<br>
          อายุงาน: ${p.service_age_text || '-'}
        </div>

        <br>

        <div class="grid profile-kpi">
          <div class="box">
            <div class="num">${l.sick_remaining || 0}</div>
            <div class="label">ลาป่วยคงเหลือ</div>
          </div>

          <div class="box">
            <div class="num">${l.vacation_remaining || 0}</div>
            <div class="label">พักร้อนคงเหลือ</div>
          </div>

          <div class="box late-box">
            <div class="num">${p.late_count_current_period || 0}</div>
            <div class="label">
              มาสาย<br>รอบปีนี้
              ${p.late_minutes_current_period ? '<br>รวม ' + p.late_minutes_current_period + ' นาที' : ''}
            </div>

          <div class="summary-box red">
            <div class="num">${profile.over_absent_count_this_year || 0}</div>
            <div class="label">หยุดเกิน<br>รอบปีนี้</div>
          </div>

          </div>
        </div>
        
        <button class="btn" onclick="openContact()">
          📞 ข้อมูลติดต่อและบุคคลฉุกเฉิน
          <span class="btn-sub">
            ${p.contact_complete ? '🟢 ข้อมูลครบถ้วนแล้ว' : '🟠 กรุณากรอกข้อมูลให้ครบ'}
          </span>
        </button>

        <button class="btn" onclick="openAttendanceHistory()">
        🕒 ประวัติการเข้างาน
        </button>

        <button class="btn" onclick="openLeaveHistory()">
        📋 ประวัติการลา
        </button>

      `;
    }

    function formatDate(value) {
      if (!value) return '-';

      const d = new Date(value);
      if (isNaN(d.getTime())) return value;

      return d.toLocaleDateString('th-TH', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function showError(message) {
      document.getElementById('app').innerHTML = `
        <div class="error">${message}</div>
      `;
    }

    function openContact() {
      window.location.href = 'https://liff.line.me/2010317944-VaiuSU2q';
    }

    function openAttendanceHistory() {
      window.location.href = 'https://liff.line.me/2010317944-JFsW8yLs';
    }

    function openLeaveHistory() {
      window.location.href = 'https://liff.line.me/2010317944-2vwp7PAW';
    }
    
    main();
  </script>
</body>
</html>
